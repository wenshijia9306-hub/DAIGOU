<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>代购账本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --card: #FFFFFF;
  --ink: #1A1A1A;
  --ink2: #555;
  --ink3: #999;
  --accent: #C0392B;
  --accent-light: #FDF3F2;
  --green: #0C9B6E;
  --green-light: #E6F7F2;
  --red: #C0392B;
  --red-light: #FDF3F2;
  --amber: #D68910;
  --amber-light: #FEF9EC;
  --blue: #2471A3;
  --border: #E8E4DC;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding-bottom: 80px; }

.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,245,240,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; height: 56px; gap: 10px;
}
.nav-logo { width: 32px; height: 32px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.nav-title { font-size: 17px; font-weight: 700; flex: 1; }
.nav-sync { font-size: 11px; color: var(--ink3); font-family: 'DM Mono', monospace; }

.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex: 1; min-width: 72px; padding: 13px 8px 11px; text-align: center; font-size: 13px; color: var(--ink3); cursor: pointer; border-bottom: 2.5px solid transparent; transition: all .2s; white-space: nowrap; user-select: none; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

.page { display: none; padding: 16px; }
.page.active { display: block; }

.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.metric { background: var(--card); border-radius: var(--radius); padding: 14px 16px; border: 1px solid var(--border); }
.metric-label { font-size: 11px; color: var(--ink3); margin-bottom: 4px; letter-spacing: .04em; }
.metric-val { font-size: 19px; font-weight: 700; font-family: 'DM Mono', monospace; }
.metric-val.green { color: var(--green); }
.metric-val.red { color: var(--red); }
.metric-val.blue { color: var(--blue); }

.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden; }
.card-head { padding: 14px 16px 12px; font-size: 14px; font-weight: 700; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-head-sub { font-size: 11px; color: var(--ink3); font-weight: 400; }

.form { padding: 14px 16px; }
.field { margin-bottom: 12px; }
.field label { font-size: 12px; color: var(--ink3); display: block; margin-bottom: 5px; font-weight: 500; letter-spacing: .02em; }
.field input, .field select { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--ink); appearance: none; transition: border-color .2s, background .2s; }
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); background: white; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cost-preview { background: linear-gradient(135deg, #FDF3F2, #FEF9EC); border: 1px solid #F5C6C2; border-radius: 10px; padding: 11px 14px; font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 12px; font-family: 'DM Mono', monospace; display: flex; justify-content: space-between; align-items: center; }
.cost-preview-label { font-size: 11px; color: var(--ink3); font-weight: 400; font-family: 'Noto Sans SC', sans-serif; }

.btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans SC', sans-serif; cursor: pointer; transition: opacity .15s, transform .1s; letter-spacing: .02em; }
.btn:active { opacity: .85; transform: scale(.99); }

.section-title { font-size: 11px; font-weight: 700; color: var(--ink3); letter-spacing: .08em; text-transform: uppercase; padding: 14px 0 8px; }

.list-item { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; }
.list-item:last-child { border-bottom: none; }
.item-avatar { width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
.item-main { flex: 1; min-width: 0; }
.item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 12px; color: var(--ink3); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.item-right { text-align: right; flex-shrink: 0; }
.item-amount { font-size: 15px; font-weight: 700; font-family: 'DM Mono', monospace; }
.item-date { font-size: 11px; color: var(--ink3); margin-top: 3px; font-family: 'DM Mono', monospace; }

.badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge.paid { background: var(--green-light); color: var(--green); }
.badge.partial { background: var(--amber-light); color: var(--amber); }
.badge.unpaid { background: var(--red-light); color: var(--red); }

.del-btn { background: none; border: none; color: #CCC; font-size: 14px; cursor: pointer; padding: 2px 4px; flex-shrink: 0; transition: color .15s; }
.del-btn:hover { color: var(--red); }

.empty { text-align: center; padding: 44px 20px; color: var(--ink3); font-size: 14px; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }

.split-wrap { padding: 14px 16px; }
.split-bar { display: flex; align-items: center; gap: 12px; margin: 8px 0 6px; }
.split-person { font-size: 13px; font-weight: 700; min-width: 18px; }
.split-bar input[type=range] { flex: 1; height: 5px; border-radius: 4px; accent-color: var(--accent); }
.split-pct-row { text-align: center; font-size: 13px; color: var(--ink3); margin-bottom: 14px; }
.split-result { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.split-box { background: var(--bg); border-radius: 10px; padding: 11px 10px; text-align: center; border: 1px solid var(--border); }
.split-box .s-label { font-size: 11px; color: var(--ink3); margin-bottom: 5px; }
.split-box .s-val { font-size: 15px; font-weight: 700; font-family: 'DM Mono', monospace; }
.split-box.total .s-val { color: var(--ink); }
.split-box.a-box .s-val { color: var(--accent); }
.split-box.b-box .s-val { color: var(--blue); }

.profit-row { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
.profit-row:last-child { border-bottom: none; }
.pr-name { font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-split { font-size: 11px; color: var(--ink3); text-align: right; min-width: 80px; line-height: 1.6; }
.pr-profit { font-size: 14px; font-family: 'DM Mono', monospace; font-weight: 700; min-width: 72px; text-align: right; }

.mark-btn { background: var(--green-light); color: var(--green); border: 1px solid #9DE5C9; border-radius: 7px; padding: 5px 10px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; flex-shrink: 0; }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(16px); background: #1A1A1A; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .25s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 4px; }
.sync-dot.ok { background: var(--green); }
.sync-dot.err { background: var(--red); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">🧾</div>
  <div class="nav-title">代购账本</div>
  <div class="nav-sync"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">连接中</span></div>
</nav>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">📋 订单</div>
  <div class="tab" onclick="switchTab(1)">💰 成本</div>
  <div class="tab" onclick="switchTab(2)">📈 利润</div>
  <div class="tab" onclick="switchTab(3)">⚠️ 欠款</div>
</div>

<!-- 订单页 -->
<div class="page active" id="p0">
  <div class="metrics" id="order-metrics"></div>
  <div class="card">
    <div class="card-head">新增订单</div>
    <div class="form">
      <div class="field-row">
        <div class="field"><label>客户姓名</label><input id="o-name" placeholder="例：小明"></div>
        <div class="field"><label>商品名称</label><input id="o-item" placeholder="例：LV包"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>客户应付 (¥)</label><input id="o-price" type="number" inputmode="decimal" placeholder="0.00"></div>
        <div class="field"><label>已收金额 (¥)</label><input id="o-paid" type="number" inputmode="decimal" placeholder="0.00"></div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>收款状态</label>
          <select id="o-status">
            <option value="paid">✅ 已付清</option>
            <option value="partial">🟡 部分付款</option>
            <option value="unpaid">🔴 未付款</option>
          </select>
        </div>
        <div class="field">
          <label>负责人</label>
          <select id="o-owner">
            <option value="忻">忻</option>
            <option value="佳">佳</option>
          </select>
        </div>
      </div>
      <div class="field"><label>日期</label><input id="o-date" type="date"></div>
      <button class="btn" onclick="addOrder()">+ 添加订单</button>
    </div>
  </div>
  <div class="section-title">全部订单</div>
  <div class="card" id="order-list"></div>
</div>

<!-- 成本页 -->
<div class="page" id="p1">
  <div class="card">
    <div class="card-head">录入采购成本</div>
    <div class="form">
      <div class="field"><label>关联订单</label><select id="c-order"></select></div>
      <div class="field-row">
        <div class="field"><label>采购价（原价）</label><input id="c-purchase" type="number" inputmode="decimal" placeholder="0.00" oninput="updateCostPreview()"></div>
        <div class="field">
          <label>货币</label>
          <select id="c-currency" onchange="updateCostPreview()">
            <option value="CNY">CNY 人民币</option>
            <option value="JPY">JPY 日元</option>
            <option value="EUR">EUR 欧元</option>
            <option value="GBP">GBP 英镑</option>
            <option value="USD">USD 美元</option>
            <option value="HKD">HKD 港元</option>
            <option value="SGD">SGD 新币</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>汇率（换算人民币）</label><input id="c-rate" type="number" inputmode="decimal" placeholder="人民币填1" oninput="updateCostPreview()"></div>
        <div class="field"><label>运费 (¥)</label><input id="c-ship" type="number" inputmode="decimal" placeholder="0.00" oninput="updateCostPreview()"></div>
      </div>
      <div class="field"><label>其他费用 (¥)</label><input id="c-misc" type="number" inputmode="decimal" placeholder="0.00" oninput="updateCostPreview()"></div>
      <div class="cost-preview">
        <span class="cost-preview-label">预估总成本</span>
        <span id="cost-preview-val">¥0.00</span>
      </div>
      <button class="btn" onclick="addCost()">+ 录入成本</button>
    </div>
  </div>
  <div class="section-title">成本记录</div>
  <div class="card" id="cost-list"></div>
</div>

<!-- 利润页 -->
<div class="page" id="p2">
  <div class="metrics" id="profit-metrics"></div>
  <div class="card">
    <div class="card-head">两人分账<span class="card-head-sub">拖动调整比例</span></div>
    <div class="split-wrap">
      <div class="split-bar">
        <span class="split-person" style="color:var(--accent)">忻</span>
        <input type="range" id="split-slider" min="0" max="100" value="50" step="1" oninput="updateSplit(this.value)">
        <span class="split-person" style="color:var(--blue)">佳</span>
      </div>
      <div class="split-pct-row">忻 <strong id="pct-a" style="color:var(--accent)">50</strong>% · 佳 <strong id="pct-b" style="color:var(--blue)">50</strong>%</div>
      <div class="split-result" id="split-result"></div>
    </div>
  </div>
  <div class="section-title">逐笔明细</div>
  <div class="card" id="profit-table"></div>
</div>

<!-- 欠款页 -->
<div class="page" id="p3">
  <div class="metrics" id="debt-metrics"></div>
  <div class="section-title">欠款客户</div>
  <div class="card" id="debt-list"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgDIMqK7tyUtt0Va3RcGiZUqu1wC3niaM",
  authDomain: "daigou-772a9.firebaseapp.com",
  projectId: "daigou-772a9",
  storageBucket: "daigou-772a9.firebasestorage.app",
  messagingSenderId: "912555651106",
  appId: "1:912555651106:web:4bed7144936f2ad9c09a7b",
  measurementId: "G-2NF6N6ZQBJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let orders = [], costs = [], splitA = 50;

function $(id) { return document.getElementById(id); }
function cny(n) { return '¥' + parseFloat(n||0).toFixed(2); }
function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function setSyncStatus(ok) {
  $('sync-dot').className = 'sync-dot ' + (ok ? 'ok' : 'err');
  $('sync-text').textContent = ok ? '已同步' : '离线';
}

// ── 实时监听 ───────────────────────────────────────────────────────
onSnapshot(collection(db, 'orders'), snap => {
  orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  setSyncStatus(true);
  renderOrderMetrics(); renderOrderList();
  renderCostSelect();
  if ($('p2').classList.contains('active')) renderProfit();
  if ($('p3').classList.contains('active')) renderDebt();
}, () => setSyncStatus(false));

onSnapshot(collection(db, 'costs'), snap => {
  costs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  setSyncStatus(true);
  if ($('p1').classList.contains('active')) renderCostList();
  if ($('p2').classList.contains('active')) renderProfit();
}, () => setSyncStatus(false));

onSnapshot(doc(db, 'settings', 'split'), snap => {
  if (snap.exists()) {
    splitA = snap.data().splitA || 50;
    $('split-slider').value = splitA;
    $('pct-a').textContent = splitA;
    $('pct-b').textContent = 100 - splitA;
    if ($('p2').classList.contains('active')) renderProfit();
  }
}, () => {});

// ── Tab ────────────────────────────────────────────────────────────
window.switchTab = function(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.page').forEach((p,j) => p.classList.toggle('active', i===j));
  if (i===1) { renderCostSelect(); renderCostList(); }
  if (i===2) renderProfit();
  if (i===3) renderDebt();
}

// ── Orders ─────────────────────────────────────────────────────────
window.addOrder = async function() {
  const name = $('o-name').value.trim();
  const item = $('o-item').value.trim();
  const price = parseFloat($('o-price').value)||0;
  const status = $('o-status').value;
  const paid = parseFloat($('o-paid').value)||(status==='paid'?price:0);
  const date = $('o-date').value || new Date().toISOString().split('T')[0];
  const owner = $('o-owner').value;
  if (!name||!item||!price) { toast('请填写姓名、商品和金额'); return; }
  try {
    await addDoc(collection(db, 'orders'), { name, item, price, status, paid, date, owner, ts: Date.now() });
    $('o-name').value=''; $('o-item').value=''; $('o-price').value=''; $('o-paid').value='';
    toast('订单已添加 ✓');
  } catch(e) { toast('保存失败，请检查网络'); }
}

window.delOrder = async function(id) {
  if (!confirm('确定删除这条订单？')) return;
  try {
    await deleteDoc(doc(db, 'orders', id));
    costs.filter(c => c.oid===id).forEach(c => deleteDoc(doc(db, 'costs', c.id)));
    toast('已删除');
  } catch(e) { toast('删除失败'); }
}

function renderOrderMetrics() {
  const totalFlow = orders.reduce((s,o) => s+o.price, 0);
  const totalPaid = orders.reduce((s,o) => s+o.paid, 0);
  const totalOwed = totalFlow - totalPaid;
  $('order-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">总流水</div><div class="metric-val blue">${cny(totalFlow)}</div></div>
    <div class="metric"><div class="metric-label">已收款</div><div class="metric-val green">${cny(totalPaid)}</div></div>
    <div class="metric"><div class="metric-label">待收款</div><div class="metric-val red">${cny(totalOwed)}</div></div>
    <div class="metric"><div class="metric-label">订单数</div><div class="metric-val">${orders.length} 笔</div></div>
  `;
}

function renderOrderList() {
  const el = $('order-list');
  if (!orders.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>还没有订单，快来添加第一笔吧</div>'; return; }
  const sorted = [...orders].sort((a,b) => (b.ts||0)-(a.ts||0));
  el.innerHTML = sorted.map(o => {
    const owed = o.price - o.paid;
    const badgeClass = {paid:'paid',partial:'partial',unpaid:'unpaid'}[o.status];
    const badgeText = {paid:'已付清',partial:'部分付款',unpaid:'未付款'}[o.status];
    const avatarStyle = o.owner==='忻' ? 'background:#FDF3F2;color:var(--accent)' : 'background:#EEF4FA;color:var(--blue)';
    return `<div class="list-item">
      <div class="item-avatar" style="${avatarStyle}">${o.owner}</div>
      <div class="item-main">
        <div class="item-title">${o.name} · ${o.item}</div>
        <div class="item-meta">
          <span class="badge ${badgeClass}">${badgeText}</span>
          ${owed>0 ? `<span style="color:var(--red)">欠 ${cny(owed)}</span>` : ''}
        </div>
      </div>
      <div class="item-right">
        <div class="item-amount">${cny(o.price)}</div>
        <div class="item-date">${o.date}</div>
        <button class="del-btn" onclick="delOrder('${o.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── Costs ────────────────────────────────────────────────────────────
function renderCostSelect() {
  const sel = $('c-order');
  if (!orders.length) { sel.innerHTML = '<option>请先添加订单</option>'; return; }
  sel.innerHTML = orders.map(o => `<option value="${o.id}">${o.name} — ${o.item}</option>`).join('');
}

window.updateCostPreview = function() {
  const p = parseFloat($('c-purchase').value)||0;
  const r = parseFloat($('c-rate').value)||1;
  const s = parseFloat($('c-ship').value)||0;
  const m = parseFloat($('c-misc').value)||0;
  $('cost-preview-val').textContent = '¥' + (p*r+s+m).toFixed(2);
}

window.addCost = async function() {
  const oid = $('c-order').value;
  const order = orders.find(o => o.id === oid);
  if (!order) { toast('请先添加订单'); return; }
  const purchase = parseFloat($('c-purchase').value)||0;
  const currency = $('c-currency').value;
  const rate = parseFloat($('c-rate').value)||1;
  const ship = parseFloat($('c-ship').value)||0;
  const misc = parseFloat($('c-misc').value)||0;
  const totalCNY = purchase*rate + ship + misc;
  try {
    await addDoc(collection(db, 'costs'), { oid, orderLabel: order.name+' — '+order.item, purchase, currency, rate, ship, misc, totalCNY, ts: Date.now() });
    $('c-purchase').value=''; $('c-rate').value=''; $('c-ship').value=''; $('c-misc').value='';
    $('cost-preview-val').textContent = '¥0.00';
    toast('成本已录入 ✓');
  } catch(e) { toast('保存失败，请检查网络'); }
}

window.delCost = async function(id) {
  if (!confirm('确定删除？')) return;
  try { await deleteDoc(doc(db, 'costs', id)); toast('已删除'); } catch(e) { toast('删除失败'); }
}

function renderCostList() {
  const el = $('cost-list');
  if (!costs.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">💰</div>还没有成本记录</div>'; return; }
  const sorted = [...costs].sort((a,b) => (b.ts||0)-(a.ts||0));
  el.innerHTML = sorted.map(c => `
    <div class="list-item">
      <div class="item-main">
        <div class="item-title">${c.orderLabel}</div>
        <div class="item-meta">${c.currency==='CNY'?'人民币直采':c.purchase.toFixed(0)+' '+c.currency+' × '+c.rate} · 运费 ${cny(c.ship)}</div>
      </div>
      <div class="item-right">
        <div class="item-amount" style="color:var(--red)">${cny(c.totalCNY)}</div>
        <button class="del-btn" onclick="delCost('${c.id}')">✕</button>
      </div>
    </div>`).join('');
}

// ── Profit ───────────────────────────────────────────────────────────
function getOrderCost(o) { return costs.filter(c => c.oid===o.id).reduce((s,c) => s+c.totalCNY, 0); }
function getProfit(o) { return o.price - getOrderCost(o); }

window.updateSplit = async function(v) {
  splitA = parseInt(v);
  $('pct-a').textContent = splitA;
  $('pct-b').textContent = 100-splitA;
  renderSplitResult(); renderProfitTable();
  try { await setDoc(doc(db, 'settings', 'split'), { splitA }); } catch(e) {}
}

function renderSplitResult() {
  const total = orders.reduce((s,o) => s+getProfit(o), 0);
  $('split-result').innerHTML = `
    <div class="split-box total"><div class="s-label">总利润</div><div class="s-val">${cny(total)}</div></div>
    <div class="split-box a-box"><div class="s-label">忻 应得</div><div class="s-val">${cny(total*splitA/100)}</div></div>
    <div class="split-box b-box"><div class="s-label">佳 应得</div><div class="s-val">${cny(total*(100-splitA)/100)}</div></div>
  `;
}

function renderProfit() {
  const totalRev = orders.reduce((s,o) => s+o.price, 0);
  const totalCost = costs.reduce((s,c) => s+c.totalCNY, 0);
  const totalProfit = totalRev - totalCost;
  const margin = totalRev ? (totalProfit/totalRev*100).toFixed(1) : '0.0';
  $('profit-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">总收入</div><div class="metric-val blue">${cny(totalRev)}</div></div>
    <div class="metric"><div class="metric-label">总成本</div><div class="metric-val red">${cny(totalCost)}</div></div>
    <div class="metric"><div class="metric-label">总利润</div><div class="metric-val ${totalProfit>=0?'green':'red'}">${cny(totalProfit)}</div></div>
    <div class="metric"><div class="metric-label">利润率</div><div class="metric-val">${margin}%</div></div>
  `;
  $('split-slider').value = splitA;
  $('pct-a').textContent = splitA; $('pct-b').textContent = 100-splitA;
  renderSplitResult(); renderProfitTable();
}

function renderProfitTable() {
  const el = $('profit-table');
  if (!orders.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>暂无数据</div>'; return; }
  const sorted = [...orders].sort((a,b) => (b.ts||0)-(a.ts||0));
  el.innerHTML = sorted.map(o => {
    const cost = getOrderCost(o);
    const p = o.price - cost;
    const pA = p*splitA/100, pB = p*(100-splitA)/100;
    return `<div class="profit-row">
      <div class="pr-name">${o.name} · ${o.item}</div>
      <div class="pr-split">忻: ${cny(pA)}<br>佳: ${cny(pB)}</div>
      <div class="pr-profit" style="color:${p>=0?'var(--green)':'var(--red)'}">${cny(p)}</div>
    </div>`;
  }).join('');
}

// ── Debt ─────────────────────────────────────────────────────────────
window.markPaid = async function(id) {
  try {
    const o = orders.find(o => o.id===id);
    if (o) await setDoc(doc(db, 'orders', id), { ...o, status:'paid', paid:o.price });
    toast('已标记付清 ✓');
  } catch(e) { toast('更新失败'); }
}

function renderDebt() {
  const debtors = orders.filter(o => o.paid < o.price);
  const totalDebt = debtors.reduce((s,o) => s+(o.price-o.paid), 0);
  $('debt-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">欠款客户</div><div class="metric-val red">${debtors.length} 人</div></div>
    <div class="metric"><div class="metric-label">总欠款</div><div class="metric-val red">${cny(totalDebt)}</div></div>
  `;
  const el = $('debt-list');
  if (!debtors.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🎉</div>太棒了！暂无欠款客户</div>'; return; }
  el.innerHTML = debtors.map(o => {
    const owed = o.price - o.paid;
    return `<div class="list-item">
      <div class="item-main">
        <div class="item-title">${o.name} · ${o.item}</div>
        <div class="item-meta">应收 ${cny(o.price)} · 已收 ${cny(o.paid)}</div>
      </div>
      <div class="item-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="item-amount" style="color:var(--red)">${cny(owed)}</div>
        <button class="mark-btn" onclick="markPaid('${o.id}')">标记付清</button>
      </div>
    </div>`;
  }).join('');
}

// ── Init ─────────────────────────────────────────────────────────────
$('o-date').value = new Date().toISOString().split('T')[0];
renderOrderMetrics(); renderOrderList();
</script>
</body>
</html>
