<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>代购账本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --card: #FFFFFF;
  --ink: #1A1A1A;
  --ink2: #555;
  --ink3: #999;
  --accent: #2B5CE6;
  --accent-light: #EEF2FF;
  --green: #0C9B6E;
  --green-light: #E6F7F2;
  --red: #D63031;
  --red-light: #FEF0F0;
  --amber: #E67E22;
  --amber-light: #FEF6EC;
  --border: #E8E4DC;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* NAV */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,245,240,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px;
  height: 56px;
}
.nav-title { font-size: 17px; font-weight: 700; flex: 1; }
.nav-sub { font-size: 12px; color: var(--ink3); font-family: 'DM Mono', monospace; }

/* TABS */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1; min-width: 72px;
  padding: 12px 8px 10px;
  text-align: center;
  font-size: 13px;
  color: var(--ink3);
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  transition: all .2s;
  white-space: nowrap;
  user-select: none;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

/* PAGES */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* METRIC CARDS */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.metric {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  border: 1px solid var(--border);
}
.metric-label { font-size: 11px; color: var(--ink3); margin-bottom: 4px; letter-spacing: .03em; }
.metric-val { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
.metric-val.green { color: var(--green); }
.metric-val.red { color: var(--red); }
.metric-val.blue { color: var(--accent); }

/* CARD */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 14px;
  overflow: hidden;
}
.card-head {
  padding: 14px 16px 10px;
  font-size: 14px; font-weight: 700;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* FORM */
.form { padding: 14px 16px; }
.field { margin-bottom: 12px; }
.field label { font-size: 12px; color: var(--ink3); display: block; margin-bottom: 5px; }
.field input, .field select {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  appearance: none;
  transition: border-color .2s;
}
.field input:focus, .field select:focus {
  outline: none; border-color: var(--accent);
  background: white;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.cost-preview {
  background: var(--accent-light);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 12px;
  font-family: 'DM Mono', monospace;
}

/* BUTTON */
.btn {
  width: 100%; padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.btn:active { opacity: .85; transform: scale(.98); }
.btn.secondary {
  background: var(--bg);
  color: var(--accent);
  border: 1.5px solid var(--accent);
}
.btn.danger-btn { background: var(--red); }
.btn.small-btn {
  width: auto; padding: 5px 12px;
  font-size: 12px; border-radius: 7px; font-weight: 500;
}

/* LIST */
.list-item {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px;
}
.list-item:last-child { border-bottom: none; }
.item-main { flex: 1; min-width: 0; }
.item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub { font-size: 12px; color: var(--ink3); margin-top: 2px; }
.item-right { text-align: right; flex-shrink: 0; }
.item-amount { font-size: 15px; font-weight: 700; font-family: 'DM Mono', monospace; }
.item-date { font-size: 11px; color: var(--ink3); margin-top: 2px; font-family: 'DM Mono', monospace; }

/* BADGE */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px; font-weight: 500;
}
.badge.paid { background: var(--green-light); color: var(--green); }
.badge.partial { background: var(--amber-light); color: var(--amber); }
.badge.unpaid { background: var(--red-light); color: var(--red); }

/* EMPTY */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink3);
  font-size: 14px;
}
.empty-icon { font-size: 36px; margin-bottom: 8px; }

/* SPLIT SLIDER */
.split-wrap { padding: 14px 16px; }
.split-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.split-bar input[type=range] {
  flex: 1; height: 4px; border-radius: 4px;
  accent-color: var(--accent);
}
.split-label { font-size: 13px; color: var(--ink2); }
.split-result {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; margin-top: 12px;
}
.split-box {
  background: var(--bg);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}
.split-box .s-label { font-size: 11px; color: var(--ink3); margin-bottom: 4px; }
.split-box .s-val { font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; }
.split-box.total .s-val { color: var(--ink); }
.split-box.a .s-val { color: var(--accent); }
.split-box.b .s-val { color: var(--green); }

/* PROFIT TABLE */
.profit-table { padding: 0; }
.profit-row {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.profit-row:last-child { border-bottom: none; }
.pr-name { font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-profit { font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 500; min-width: 70px; text-align: right; }

/* DELETE BTN */
.del-btn {
  background: none; border: none;
  color: var(--ink3); font-size: 16px;
  cursor: pointer; padding: 0 4px;
  flex-shrink: 0;
}

/* MARK PAID */
.mark-btn {
  background: var(--green-light);
  color: var(--green);
  border: 1px solid var(--green);
  border-radius: 7px;
  padding: 5px 10px;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  flex-shrink: 0;
}

/* SECTION TITLE */
.section-title {
  font-size: 12px; font-weight: 500;
  color: var(--ink3);
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 14px 0 6px;
}

/* TOAST */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1A1A1A; color: white;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px;
  opacity: 0; transition: all .3s;
  pointer-events: none; z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav class="nav">
  <div>
    <div class="nav-title">代购账本</div>
    <div class="nav-sub" id="nav-date"></div>
  </div>
</nav>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">订单</div>
  <div class="tab" onclick="switchTab(1)">成本</div>
  <div class="tab" onclick="switchTab(2)">利润</div>
  <div class="tab" onclick="switchTab(3)">欠款</div>
</div>

<!-- 订单页 -->
<div class="page active" id="p0">
  <div class="metrics" id="order-metrics"></div>

  <div class="card">
    <div class="card-head">新增订单</div>
    <div class="form">
      <div class="field-row">
        <div class="field"><label>客户姓名</label><input id="o-name" placeholder="例：小明"></div>
        <div class="field"><label>商品</label><input id="o-item" placeholder="例：LV包"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>客户付款 (SGD)</label><input id="o-price" type="number" inputmode="decimal" placeholder="0.00"></div>
        <div class="field"><label>已收金额 (SGD)</label><input id="o-paid" type="number" inputmode="decimal" placeholder="0.00"></div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>收款状态</label>
          <select id="o-status">
            <option value="paid">✅ 已付清</option>
            <option value="partial">🟡 部分付款</option>
            <option value="unpaid">🔴 未付款</option>
          </select>
        </div>
        <div class="field">
          <label>负责人</label>
          <select id="o-owner">
            <option value="A">A</option>
            <option value="B">B</option>
          </select>
        </div>
      </div>
      <div class="field"><label>日期</label><input id="o-date" type="date"></div>
      <button class="btn" onclick="addOrder()">+ 添加订单</button>
    </div>
  </div>

  <div class="section-title">全部订单</div>
  <div class="card" id="order-list"></div>
</div>

<!-- 成本页 -->
<div class="page" id="p1">
  <div class="card">
    <div class="card-head">录入采购成本</div>
    <div class="form">
      <div class="field"><label>关联订单</label><select id="c-order"></select></div>
      <div class="field-row">
        <div class="field"><label>采购价（原币）</label><input id="c-purchase" type="number" inputmode="decimal" placeholder="0" oninput="updateCostPreview()"></div>
        <div class="field">
          <label>货币</label>
          <select id="c-currency" onchange="updateCostPreview()">
            <option value="JPY">JPY 日元</option>
            <option value="EUR">EUR 欧元</option>
            <option value="GBP">GBP 英镑</option>
            <option value="USD">USD 美元</option>
            <option value="CNY">CNY 人民币</option>
            <option value="HKD">HKD 港元</option>
            <option value="SGD">SGD 新币</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>汇率（换算SGD）</label><input id="c-rate" type="number" inputmode="decimal" placeholder="例：0.0092" oninput="updateCostPreview()"></div>
        <div class="field"><label>运费 (SGD)</label><input id="c-ship" type="number" inputmode="decimal" placeholder="0.00" oninput="updateCostPreview()"></div>
      </div>
      <div class="field"><label>其他费用 (SGD)</label><input id="c-misc" type="number" inputmode="decimal" placeholder="0.00" oninput="updateCostPreview()"></div>
      <div class="cost-preview" id="cost-preview">预估总成本：SGD 0.00</div>
      <button class="btn" onclick="addCost()">+ 录入成本</button>
    </div>
  </div>

  <div class="section-title">成本记录</div>
  <div class="card" id="cost-list"></div>
</div>

<!-- 利润页 -->
<div class="page" id="p2">
  <div class="metrics" id="profit-metrics"></div>

  <div class="card">
    <div class="card-head">两人分账</div>
    <div class="split-wrap">
      <div class="split-label" style="margin-bottom:8px">拖动调整分账比例</div>
      <div class="split-bar">
        <span style="font-size:13px;font-weight:500;min-width:20px">A</span>
        <input type="range" id="split-slider" min="0" max="100" value="50" step="1" oninput="updateSplit(this.value)">
        <span style="font-size:13px;font-weight:500;min-width:20px">B</span>
      </div>
      <div style="font-size:12px;color:var(--ink3);text-align:center;margin-bottom:12px">
        A <span id="pct-a" style="font-weight:700;color:var(--accent)">50</span>% &nbsp;/&nbsp; B <span id="pct-b" style="font-weight:700;color:var(--green)">50</span>%
      </div>
      <div class="split-result" id="split-result"></div>
    </div>
  </div>

  <div class="section-title">逐笔明细</div>
  <div class="card" id="profit-table"></div>
</div>

<!-- 欠款页 -->
<div class="page" id="p3">
  <div class="metrics" id="debt-metrics"></div>
  <div class="section-title">欠款客户</div>
  <div class="card" id="debt-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
let orders = [], costs = [], splitA = 50;

function save() {
  localStorage.setItem('dg_orders', JSON.stringify(orders));
  localStorage.setItem('dg_costs', JSON.stringify(costs));
  localStorage.setItem('dg_split', splitA);
}
function load() {
  try { orders = JSON.parse(localStorage.getItem('dg_orders') || '[]'); } catch(e) { orders = []; }
  try { costs = JSON.parse(localStorage.getItem('dg_costs') || '[]'); } catch(e) { costs = []; }
  splitA = parseInt(localStorage.getItem('dg_split') || '50');
}

// ── Helpers ────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
function sgd(n) { return 'SGD ' + parseFloat(n||0).toFixed(2); }
function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Tab ────────────────────────────────────────────────────────────
function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.page').forEach((p,j) => p.classList.toggle('active', i===j));
  if (i===0) { renderOrderMetrics(); renderOrderList(); }
  if (i===1) { renderCostSelect(); renderCostList(); }
  if (i===2) { renderProfit(); }
  if (i===3) { renderDebt(); }
}

// ── Orders ─────────────────────────────────────────────────────────
function addOrder() {
  const name = $('o-name').value.trim();
  const item = $('o-item').value.trim();
  const price = parseFloat($('o-price').value)||0;
  const status = $('o-status').value;
  const paid = parseFloat($('o-paid').value)||(status==='paid'?price:0);
  const date = $('o-date').value || new Date().toISOString().split('T')[0];
  const owner = $('o-owner').value;
  if (!name||!item||!price) { toast('请填写姓名、商品和金额'); return; }
  orders.push({ id: Date.now(), name, item, price, status, paid, date, owner });
  save();
  $('o-name').value=''; $('o-item').value=''; $('o-price').value=''; $('o-paid').value='';
  toast('订单已添加 ✓');
  renderOrderMetrics(); renderOrderList();
}

function delOrder(id) {
  if (!confirm('确定删除这条订单？')) return;
  orders = orders.filter(o => o.id !== id);
  costs = costs.filter(c => c.oid !== id);
  save(); renderOrderMetrics(); renderOrderList();
}

function renderOrderMetrics() {
  const totalFlow = orders.reduce((s,o) => s+o.price, 0);
  const totalPaid = orders.reduce((s,o) => s+o.paid, 0);
  const totalOwed = totalFlow - totalPaid;
  $('order-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">总流水</div><div class="metric-val blue">${sgd(totalFlow)}</div></div>
    <div class="metric"><div class="metric-label">已收款</div><div class="metric-val green">${sgd(totalPaid)}</div></div>
    <div class="metric"><div class="metric-label">待收款</div><div class="metric-val red">${sgd(totalOwed)}</div></div>
    <div class="metric"><div class="metric-label">订单数</div><div class="metric-val">${orders.length}</div></div>
  `;
}

function renderOrderList() {
  const el = $('order-list');
  if (!orders.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>还没有订单，添加第一笔吧</div>'; return; }
  el.innerHTML = [...orders].reverse().map(o => {
    const owed = o.price - o.paid;
    const badgeClass = {paid:'paid',partial:'partial',unpaid:'unpaid'}[o.status];
    const badgeText = {paid:'已付清',partial:'部分付款',unpaid:'未付款'}[o.status];
    return `<div class="list-item">
      <div class="item-main">
        <div class="item-title">${o.name} · ${o.item}</div>
        <div class="item-sub" style="margin-top:4px">
          <span class="badge ${badgeClass}">${badgeText}</span>
          <span style="margin-left:6px">负责人：${o.owner}</span>
        </div>
        ${owed>0 ? `<div class="item-sub" style="color:var(--red);margin-top:2px">欠款 ${sgd(owed)}</div>` : ''}
      </div>
      <div class="item-right">
        <div class="item-amount">${sgd(o.price)}</div>
        <div class="item-date">${o.date}</div>
        <button class="del-btn" onclick="delOrder(${o.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── Costs ──────────────────────────────────────────────────────────
function renderCostSelect() {
  const sel = $('c-order');
  if (!orders.length) { sel.innerHTML = '<option>请先添加订单</option>'; return; }
  sel.innerHTML = orders.map(o => `<option value="${o.id}">${o.name} — ${o.item}</option>`).join('');
}

function updateCostPreview() {
  const p = parseFloat($('c-purchase').value)||0;
  const r = parseFloat($('c-rate').value)||1;
  const s = parseFloat($('c-ship').value)||0;
  const m = parseFloat($('c-misc').value)||0;
  $('cost-preview').textContent = '预估总成本：SGD ' + (p*r+s+m).toFixed(2);
}

function addCost() {
  const oid = parseInt($('c-order').value);
  const order = orders.find(o => o.id === oid);
  if (!order) { toast('请先添加订单'); return; }
  const purchase = parseFloat($('c-purchase').value)||0;
  const currency = $('c-currency').value;
  const rate = parseFloat($('c-rate').value)||1;
  const ship = parseFloat($('c-ship').value)||0;
  const misc = parseFloat($('c-misc').value)||0;
  const totalSGD = purchase*rate+ship+misc;
  costs.push({ id: Date.now(), oid, orderLabel: order.name+' — '+order.item, purchase, currency, rate, ship, misc, totalSGD });
  save();
  $('c-purchase').value=''; $('c-rate').value=''; $('c-ship').value=''; $('c-misc').value='';
  updateCostPreview();
  toast('成本已录入 ✓');
  renderCostList();
}

function delCost(id) {
  if (!confirm('确定删除？')) return;
  costs = costs.filter(c => c.id !== id);
  save(); renderCostList();
}

function renderCostList() {
  const el = $('cost-list');
  if (!costs.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">💰</div>还没有成本记录</div>'; return; }
  el.innerHTML = [...costs].reverse().map(c => `
    <div class="list-item">
      <div class="item-main">
        <div class="item-title">${c.orderLabel}</div>
        <div class="item-sub">${c.purchase.toFixed(0)} ${c.currency} × ${c.rate} + 运费 ${sgd(c.ship)}</div>
      </div>
      <div class="item-right">
        <div class="item-amount" style="color:var(--red)">${sgd(c.totalSGD)}</div>
        <button class="del-btn" onclick="delCost(${c.id})">✕</button>
      </div>
    </div>`).join('');
}

// ── Profit ─────────────────────────────────────────────────────────
function getProfit(o) {
  const c = costs.filter(c => c.oid===o.id).reduce((s,c) => s+c.totalSGD, 0);
  return o.price - c;
}

function updateSplit(v) {
  splitA = parseInt(v);
  $('pct-a').textContent = splitA;
  $('pct-b').textContent = 100-splitA;
  save();
  renderSplitResult();
  renderProfitTable();
}

function renderSplitResult() {
  const total = orders.reduce((s,o) => s+getProfit(o), 0);
  $('split-result').innerHTML = `
    <div class="split-box total"><div class="s-label">总利润</div><div class="s-val">${sgd(total)}</div></div>
    <div class="split-box a"><div class="s-label">A 应得</div><div class="s-val">${sgd(total*splitA/100)}</div></div>
    <div class="split-box b"><div class="s-label">B 应得</div><div class="s-val">${sgd(total*(100-splitA)/100)}</div></div>
  `;
}

function renderProfit() {
  const totalRev = orders.reduce((s,o) => s+o.price, 0);
  const totalCost = costs.reduce((s,c) => s+c.totalSGD, 0);
  const totalProfit = totalRev - totalCost;
  const margin = totalRev ? (totalProfit/totalRev*100).toFixed(1) : '0.0';
  $('profit-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">总收入</div><div class="metric-val blue">${sgd(totalRev)}</div></div>
    <div class="metric"><div class="metric-label">总成本</div><div class="metric-val red">${sgd(totalCost)}</div></div>
    <div class="metric"><div class="metric-label">总利润</div><div class="metric-val ${totalProfit>=0?'green':'red'}">${sgd(totalProfit)}</div></div>
    <div class="metric"><div class="metric-label">利润率</div><div class="metric-val">${margin}%</div></div>
  `;
  $('split-slider').value = splitA;
  $('pct-a').textContent = splitA;
  $('pct-b').textContent = 100-splitA;
  renderSplitResult();
  renderProfitTable();
}

function renderProfitTable() {
  const el = $('profit-table');
  if (!orders.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>暂无数据</div>'; return; }
  el.innerHTML = '<div class="profit-table">' + [...orders].reverse().map(o => {
    const c = costs.filter(c => c.oid===o.id).reduce((s,c) => s+c.totalSGD, 0);
    const p = o.price - c;
    const pA = p*splitA/100, pB = p*(100-splitA)/100;
    return `<div class="profit-row">
      <div class="pr-name">${o.name} · ${o.item}</div>
      <div style="font-size:11px;color:var(--ink3);text-align:right;min-width:60px">A: ${sgd(pA)}<br>B: ${sgd(pB)}</div>
      <div class="pr-profit" style="color:${p>=0?'var(--green)':'var(--red)'}">${sgd(p)}</div>
    </div>`;
  }).join('') + '</div>';
}

// ── Debt ───────────────────────────────────────────────────────────
function markPaid(id) {
  const o = orders.find(o => o.id===id);
  if (o) { o.status='paid'; o.paid=o.price; }
  save(); toast('已标记付清 ✓'); renderDebt();
}

function renderDebt() {
  const debtors = orders.filter(o => o.paid < o.price);
  const totalDebt = debtors.reduce((s,o) => s+(o.price-o.paid), 0);
  $('debt-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">欠款客户</div><div class="metric-val red">${debtors.length} 人</div></div>
    <div class="metric"><div class="metric-label">总欠款</div><div class="metric-val red">${sgd(totalDebt)}</div></div>
  `;
  const el = $('debt-list');
  if (!debtors.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🎉</div>太棒了！暂无欠款客户</div>'; return; }
  el.innerHTML = debtors.map(o => {
    const owed = o.price - o.paid;
    return `<div class="list-item">
      <div class="item-main">
        <div class="item-title">${o.name} · ${o.item}</div>
        <div class="item-sub">应收 ${sgd(o.price)} · 已收 ${sgd(o.paid)}</div>
      </div>
      <div class="item-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="item-amount" style="color:var(--red)">${sgd(owed)}</div>
        <button class="mark-btn" onclick="markPaid(${o.id})">标记付清</button>
      </div>
    </div>`;
  }).join('');
}

// ── Init ───────────────────────────────────────────────────────────
load();
const today = new Date().toISOString().split('T')[0];
$('o-date').value = today;
$('nav-date').textContent = new Date().toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'short' });
renderOrderMetrics();
renderOrderList();
</script>
</body>
</html>
